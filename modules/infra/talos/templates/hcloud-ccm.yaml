apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hcloud-ccm-install
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: hcloud-ccm-install
  namespace: kube-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hcloud-ccm-install
  namespace: kube-system
---
apiVersion: v1
kind: Secret
metadata:
  name: hcloud
  namespace: kube-system
type: Opaque
stringData:
  token: "${hcloud_token}"
%{if hcloud_network_id != ""}  network: "${hcloud_network_id}"
%{endif}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: helm-install-hcloud-ccm
  namespace: kube-system
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: helm-install-hcloud-ccm
    spec:
      restartPolicy: OnFailure
      tolerations:
        - operator: Exists
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      serviceAccount: hcloud-ccm-install
      serviceAccountName: hcloud-ccm-install
      hostNetwork: true
      containers:
      - name: helm-install-hcloud-ccm
        image: alpine:latest
        env:
        - name: KUBERNETES_SERVICE_HOST
          value: "localhost"
        - name: KUBERNETES_SERVICE_PORT
          value: "7445"
        command:
          - sh
          - -c
          - |
            apk add --no-cache helm
            helm repo add hcloud https://charts.hetzner.cloud
            helm repo update hcloud
            helm upgrade --install hccm hcloud/hcloud-cloud-controller-manager \
              --namespace kube-system \
              --set "env.HCLOUD_TOKEN.valueFrom.secretKeyRef.name=hcloud" \
              --set "env.HCLOUD_TOKEN.valueFrom.secretKeyRef.key=token" \
              --set "args.controllers=service-lb-controller" \
              ${hcloud_network_id != "" ? "--set networking.enabled=true --set networking.clusterCIDR='' --set-string env.HCLOUD_LOAD_BALANCERS_USE_PRIVATE_IP.value=true" : ""}
